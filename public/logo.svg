<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- 钳子/龙虾爪 -->
  <g transform="translate(256, 280)">
    <!-- 左爪 -->
    <path d="M-80,-120 C-120,-80 -140,0 -100,80 C-80,120 -40,140 0,120 C-20,80 -30,40 -20,0 C-10,-40 20,-60 60,-80 C40,-120 -20,-140 -80,-120 Z" 
          fill="url(#claw)" stroke="#fff" stroke-width="4"/>
    
    <!-- 右爪 -->
    <path d="M80,-120 C120,-80 140,0 100,80 C80,120 40,140 0,120 C20,80 30,40 20,0 C10,-40 -20,-60 -60,-80 C-40,-120 20,-140 80,-120 Z" 
          fill="url(#claw)" stroke="#fff" stroke-width="4"/>
    
    <!-- 中心点 -->
    <circle cx="0" cy="60" r="20" fill="#fff"/>
  </g>
  
  <!-- App 图标网格 -->
  <g transform="translate(140, 380)" opacity="0.9">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#fff"/>
    <rect x="70" y="0" width="50" height="50" rx="8" fill="#fff" opacity="0.8"/>
    <rect x="140" y="0" width="50" height="50" rx="8" fill="#fff" opacity="0.6"/>
    <rect x="210" y="0" width="50" height="50" rx="8" fill="#fff" opacity="0.8"/>
  </g>
</svg>